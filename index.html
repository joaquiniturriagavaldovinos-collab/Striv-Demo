<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Striv</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="app-shell auth-wrap">
  <button onclick="ThemeEngine.toggleTheme()"
    style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;z-index:10;">
    <span class="theme-toggle-icon">☀️</span>
  </button>
  <div class="auth-hero">
    <div class="auth-logo">STRIV</div>
    <p class="auth-sub">Forging habits. Transforming lives.</p>
  </div>
  <div class="auth-form">
    <div><label class="form-label">Email</label>
      <input class="full" type="email" id="email" style="padding:12px 14px;" value="joaquin@striv.app"></div>
    <div><label class="form-label">Password</label>
      <input class="full" type="password" id="pass" style="padding:12px 14px;" value="12345678"></div>
    <button class="btn btn-energy btn-full mt-8" id="login-btn" onclick="doLogin()" style="padding:13px;">Sign in</button>
    <div style="display:flex;align-items:center;gap:12px;color:var(--t3);font-size:11px;letter-spacing:0.5px;">
      <div style="flex:1;height:1px;background:var(--border-0);"></div>or<div style="flex:1;height:1px;background:var(--border-0);"></div>
    </div>
    <button class="btn btn-ghost btn-full" onclick="window.location.href='dashboard.html'" style="padding:13px;">Continue as guest</button>
    <p class="auth-switch">No account? <a href="register.html">Sign up free</a></p>
  </div>
</div>
<div class="toast"></div>
<script src="js/app.js"></script>
<script>
  function doLogin() {
    const e = document.getElementById('email').value.trim();
    const p = document.getElementById('pass').value;
    if (!e || !p) { showToast('Fill in all fields'); return; }
    const btn = document.getElementById('login-btn');
    btn.textContent = 'Signing in…'; btn.disabled = true;
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  }
  document.addEventListener('keydown', ev => { if (ev.key === 'Enter') doLogin(); });
</script>
</body>
</html>
